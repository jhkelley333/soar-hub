  <!-- Lid -->
  <rect x="6" y="8" width="20" height="3.5" rx="0.8" fill="#ffffff"/>
  <!-- Cup body trapezoid -->
  <path d="M8 11.5 L24 11.5 L21.5 28 Q21.5 29.5 20 29.5 L12 29.5 Q10.5 29.5 10.5 28 Z" fill="#ffffff"/>
  <!-- Accent stripe -->
  <path d="M9.2 18.5 L22.8 18.5 L22.2 22.5 L9.8 22.5 Z" fill="#E40046"/>
</svg>
