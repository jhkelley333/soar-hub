<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>SOAR Hub</title>
    <meta name="description" content="Operations hub for SOAR QSR teams — facilities work orders, personnel adjustments, store management, and team contacts." />

    <!-- PWA: web app manifest is the single source of truth for icon
         / display mode / theme color. Mobile browsers read it on
         install. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Browser address-bar tint. Matches manifest theme_color so the
         OS chrome tints to SOAR midnight blue when this is the active
         tab / installed app. -->
    <meta name="theme-color" content="#285780" />

    <!-- Browser favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- iOS PWA install hints. apple-mobile-web-app-capable lets the
         installed app render fullscreen (no Safari chrome) on iOS
         13+ when added to the home screen. status-bar-style "default"
         renders an opaque white status bar with dark icons that sits
         above page content (vs. "black-translucent" which paints the
         status bar transparently over content and caused overlap with
         page headers on iPhone). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SOAR Hub" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="h-full bg-zinc-50 text-zinc-900 antialiased">
    <!-- Inline padding-top + box-sizing on #root so the iOS status-bar
         safe-area inset reaches the page even when globals.css is still
         the previous deploy's hashed file in the service-worker cache.
         The same rule lives in globals.css for explicit-ness; this is
         belt-and-suspenders for stale-cache cases on installed PWAs. -->
    <div
      id="root"
      class="h-full"
      style="padding-top: env(safe-area-inset-top, 0); box-sizing: border-box;"
    ></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
