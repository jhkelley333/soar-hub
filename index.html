<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>SOAR Hub</title>
    <meta name="description" content="Operations hub for SOAR QSR teams — facilities work orders, personnel adjustments, store management, and team contacts." />

    <!-- PWA: web app manifest is the single source of truth for icon
         / display mode / theme color. Mobile browsers read it on
         install. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Browser address-bar tint. Matches manifest theme_color so the
         OS chrome tints to SOAR midnight blue when this is the active
         tab / installed app. -->
    <meta name="theme-color" content="#285780" />

    <!-- Browser favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- iOS PWA install hints. apple-mobile-web-app-capable lets the
         installed app render fullscreen (no Safari chrome) on iOS
         13+ when added to the home screen. status-bar-style
         "black-translucent" lets the web view extend behind the
         status bar; AppShell paints a midnight strip there so the
         clock + signal icons (rendered white in this mode) sit on a
         brand-colored backdrop. Reinstall the PWA after a status-bar
         style change — iOS bakes this value in at install time. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SOAR Hub" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="h-full bg-zinc-50 text-zinc-900 antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
