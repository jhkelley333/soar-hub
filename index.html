<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>SOAR Hub</title>
    <meta name="description" content="Operations hub for SOAR QSR teams — facilities work orders, personnel adjustments, store management, and team contacts." />

    <!-- PWA: web app manifest is the single source of truth for icon
         / display mode / theme color. Mobile browsers read it on
         install. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Browser address-bar tint. Matches manifest theme_color so the
         OS chrome tints to SOAR midnight blue when this is the active
         tab / installed app. -->
    <meta name="theme-color" content="#285780" />

    <!-- Browser favicon. PNG app icon takes precedence over the legacy
         cup SVG (modern browsers prefer SVG when both are listed, so we
         list only the PNG here to force the new mark). -->
    <link rel="icon" type="image/png" href="/app-icon.png" />

    <!-- iOS PWA install hints. apple-mobile-web-app-capable lets the
         installed app render fullscreen (no Safari chrome) on iOS
         13+ when added to the home screen. status-bar-style
         "black-translucent" lets the web view extend behind the
         status bar; AppShell paints a midnight strip there so the
         clock + signal icons (rendered white in this mode) sit on a
         brand-colored backdrop. Reinstall the PWA after a status-bar
         style change — iOS bakes this value in at install time. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Cross-browser equivalent of the (now-deprecated) apple- variant
         above. Chrome/Android read this one for standalone display. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SOAR Hub" />
    <link rel="apple-touch-icon" href="/app-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- No-flash theme. Apply the stored light/dark choice to <html> BEFORE
         first paint so the redesigned shell doesn't flash the wrong theme on
         reload. Kept in sync afterwards by src/lib/theme.ts. Default light
         (other module pages aren't dark-themed yet). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("soar-theme");
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="h-full bg-midnight text-zinc-900 antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Boot watchdog. If the JS bundle fails to load or mount (e.g. a stale
         cached HTML shell pointing at a hashed bundle that was purged by an
         atomic deploy), the page is left as a blank brand-colored screen.
         A classic (non-module) script runs even when the module bundle
         fails, so this can detect the dead boot and self-recover ONCE per
         session: clear all caches, then reload to fetch the fresh shell +
         bundle. Guarded against reload loops via sessionStorage. -->
    <script>
      (function () {
        var KEY = "soar_boot_recovery";
        var TIMEOUT_MS = 10000;
        window.__SOAR_BOOTED__ = false;
        setTimeout(function () {
          var root = document.getElementById("root");
          var mounted = window.__SOAR_BOOTED__ || (root && root.childElementCount > 0);
          if (mounted) {
            sessionStorage.removeItem(KEY);
            return;
          }
          if (sessionStorage.getItem(KEY)) return; // already tried this session
          sessionStorage.setItem(KEY, "1");
          var reload = function () { window.location.reload(); };
          if (window.caches && caches.keys) {
            caches.keys()
              .then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              })
              .then(reload, reload);
          } else {
            reload();
          }
        }, TIMEOUT_MS);
      })();
    </script>
  </body>
</html>
