[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# SPA fallback — react-router handles all client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers. Vite emits content-hashed filenames under /assets/, so
# those are safe to cache forever; HTML must always be revalidated so a
# user who already has the tab open picks up the latest entry-point on
# next load instead of pinning to a stale bundle reference.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
