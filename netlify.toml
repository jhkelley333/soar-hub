[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# SPA fallback — react-router handles all client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers. Vite emits content-hashed filenames under /assets/, so
# those are safe to cache forever; the HTML entry-point must always be
# revalidated so a user picks up the latest bundle reference rather than
# pinning to a stale one. We use `no-cache` (revalidate every time) rather
# than `no-store` (never cache at all): both prevent stale pinning, but
# no-cache lets the browser — and the service worker's background
# refresh — settle a conditional request with a cheap 304 instead of
# re-downloading the document. (The service worker serves the shell from
# Cache Storage on the critical path; this header governs its background
# revalidation and any client the SW doesn't yet control.)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
