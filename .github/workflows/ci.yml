# CI — runs on every PR (and pushes to main). Type-checks, lints, and builds
# so a broken change shows red on the PR before merge. Lint fails only on
# errors; warnings are allowed (see eslint.config.js) and cleaned up over time.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Migration tracking
        run: npm run check:migrations
      - name: Build
        run: npm run build
